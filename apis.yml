aid: eigenlayer
url: https://raw.githubusercontent.com/api-evangelist/eigenlayer/refs/heads/main/apis.yml
name: EigenLayer
kind: company
description: >-
  EigenLayer is a restaking protocol on Ethereum operated by Layr Labs that lets
  stakers re-use staked ETH (or liquid-staking tokens) to secure additional
  off-chain services called Actively Validated Services (AVSs). The team has
  since unified the restaking layer with EigenDA (data availability),
  EigenCompute (verifiable off-chain compute), and EigenAI (deterministic
  inference) under the EigenCloud brand. Developer surface includes the
  EigenLayer core smart contracts, AVS framework, EigenSDK in Go and TypeScript,
  EigenCloud CLI, and language SDKs for EigenCompute / EigenDA / EigenAI.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Restaking
  - AVS
  - Ethereum
  - Data Availability
  - Verifiable Compute
  - Crypto
  - Web3
created: '2026-05-23'
modified: '2026-05-30'
specificationVersion: '0.19'
apis:
  - aid: eigenlayer:eigenlayer-contracts
    name: EigenLayer Core Contracts
    description: >-
      Solidity smart contracts that implement the EigenLayer restaking protocol -
      StrategyManager, DelegationManager, EigenPodManager, AVSDirectory, and the
      slasher. Operators register, stakers delegate, and AVSs hook in via these
      on-chain entry points.
    humanURL: https://docs.eigencloud.xyz/
    baseURL: https://github.com/Layr-Labs/eigenlayer-contracts
    tags:
      - Smart Contracts
      - Solidity
      - Restaking
      - Ethereum
    properties:
      - type: Repository
        url: https://github.com/Layr-Labs/eigenlayer-contracts
      - type: Documentation
        url: https://docs.eigencloud.xyz/
  - aid: eigenlayer:eigensdk-go
    name: EigenSDK (Go)
    description: >-
      Go SDK for building AVS operator software and AVS-side services on top of
      EigenLayer. Provides typed bindings for the core contracts, BLS aggregation
      primitives, chain clients, and helpers for registering operators and
      consuming AVS tasks.
    humanURL: https://github.com/Layr-Labs/eigensdk-go
    baseURL: https://github.com/Layr-Labs/eigensdk-go
    tags:
      - SDK
      - Go
      - AVS
      - Operators
    properties:
      - type: Repository
        url: https://github.com/Layr-Labs/eigensdk-go
  - aid: eigenlayer:eigensdk-ts
    name: EigenSDK (TypeScript)
    description: >-
      TypeScript SDK for interacting with the EigenLayer restaking protocol and
      AVS contracts from Node.js and browser apps - typed contract clients,
      operator and staker flows, and AVS task helpers.
    humanURL: https://github.com/Layr-Labs/eigenlayer-sdk
    baseURL: https://github.com/Layr-Labs/eigenlayer-sdk
    tags:
      - SDK
      - TypeScript
      - AVS
    properties:
      - type: Repository
        url: https://github.com/Layr-Labs/eigenlayer-sdk
  - aid: eigenlayer:eigenlayer-cli
    name: EigenLayer CLI
    description: >-
      Operator-facing command-line tool for keys, operator registration,
      delegation, AVS opt-in, and node-runner administration on EigenLayer.
    humanURL: https://github.com/Layr-Labs/eigenlayer-cli
    baseURL: https://github.com/Layr-Labs/eigenlayer-cli
    tags:
      - CLI
      - Operators
      - Tooling
    properties:
      - type: Repository
        url: https://github.com/Layr-Labs/eigenlayer-cli
  - aid: eigenlayer:eigenda
    name: EigenDA
    description: >-
      EigenDA is the data-availability service secured by EigenLayer restakers.
      Provides client libraries and a disperser API for posting and retrieving
      blobs of data, used by rollups and other consumers needing high-throughput
      DA without bloating L1 calldata.
    humanURL: https://docs.eigencloud.xyz/products/eigenda/
    baseURL: https://github.com/Layr-Labs/eigenda
    tags:
      - Data Availability
      - Rollups
      - AVS
    properties:
      - type: Repository
        url: https://github.com/Layr-Labs/eigenda
      - type: Documentation
        url: https://docs.eigencloud.xyz/products/eigenda/
      - type: AsyncAPI
        url: asyncapi/eigenlayer-streaming-asyncapi.yml
  - aid: eigenlayer:eigencompute
    name: EigenCompute SDK & CLI
    description: >-
      EigenCompute lets developers run arbitrary code in any language, with the
      execution secured by restakers and the result attested on-chain. Ships an
      SDK and CLI for packaging workloads, submitting jobs, and reading results.
    humanURL: https://docs.eigencloud.xyz/eigencompute/get-started/quickstart
    baseURL: https://docs.eigencloud.xyz/eigencompute/get-started/quickstart
    tags:
      - Verifiable Compute
      - SDK
      - CLI
    properties:
      - type: Documentation
        url: https://docs.eigencloud.xyz/eigencompute/get-started/quickstart
  - aid: eigenlayer:eigenai
    name: EigenAI
    description: >-
      EigenAI exposes deterministic, verifiable LLM inference over an
      OpenAI-compatible API surface, with execution and provenance secured by
      EigenLayer restakers.
    humanURL: https://docs.eigencloud.xyz/products/eigenai/
    baseURL: https://docs.eigencloud.xyz/products/eigenai/
    tags:
      - AI
      - Inference
      - OpenAI-Compatible
      - Verifiable
    properties:
      - type: Documentation
        url: https://docs.eigencloud.xyz/products/eigenai/
